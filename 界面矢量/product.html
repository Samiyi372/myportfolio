}

.lb-thumb.active{opacity:1;outline-color:rgba(255,255,255,0.55);}

<script>
/* ── Neon cursor ── */
(function () {
  const dot   = document.getElementById('nc-dot');
  const ring  = document.getElementById('nc-ring');
  const arrow = document.getElementById('nc-arrow');
  const lb    = document.getElementById('lightbox');

  let mouseX = window.innerWidth  / 2;
  let mouseY = window.innerHeight / 2;
  let ringX  = mouseX, ringY = mouseY;
  let visible = false;
  let arrowMode = false;

  function isOverMedia(mx, my) {
    const stage = document.getElementById('lb-stage');
    if (!stage) return false;
    const sr = stage.getBoundingClientRect();
    const vid = document.getElementById('lb-video');
    if (vid && vid.style.display !== 'none' && parseFloat(vid.style.opacity||0) > 0.1) {
      return mx >= sr.left && mx <= sr.right && my >= sr.top && my <= sr.bottom;
    }
    const imgA = document.getElementById('lb-img-a');
    const imgB = document.getElementById('lb-img-b');
    const img  = parseFloat(imgA.style.opacity||0) > 0.5 ? imgA : imgB;
    if (!img || !img.naturalWidth || !img.naturalHeight) return false;
    const scale = Math.min(sr.width / img.naturalWidth, sr.height / img.naturalHeight);
    const w = img.naturalWidth  * scale;
    const h = img.naturalHeight * scale;
    const left = sr.left + (sr.width  - w) / 2;
    const top  = sr.top  + (sr.height - h) / 2;
    return mx >= left && mx <= left + w && my >= top && my <= top + h;
  }

  function enterArrow(left) {
    arrowMode = true;
    dot.style.opacity = '0';
    arrow.style.transform = left
      ? 'translate(calc(-50% - 2px),-50%) rotate(90deg)'
      : 'translate(calc(-50% + 2px),-50%) rotate(-90deg)';
    if (visible) arrow.style.opacity = '1';
  }

  function leaveArrow() {
    if (!arrowMode) return;
    arrowMode = false;
    arrow.style.opacity = '0';
    if (visible) dot.style.opacity = '1';
  }

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    dot.style.left   = mouseX + 'px';
    dot.style.top    = mouseY + 'px';
    arrow.style.left = mouseX + 'px';
    arrow.style.top  = mouseY + 'px';

    if (!visible) {
      visible = true;
      ring.style.opacity = '1';
      if (!arrowMode) dot.style.opacity = '1';
    }

    if (lb.classList.contains('open')) {
      const over = document.elementFromPoint(mouseX, mouseY);
      if (over && over.closest('#lb-close, #lb-thumbs')) {
        leaveArrow();
      } else if (isOverMedia(mouseX, mouseY)) {
        leaveArrow();
      } else {
        enterArrow(mouseX < window.innerWidth / 2);
      }
    } else {
      leaveArrow();
    }
  });

  (function animateRing() {
    ringX += (mouseX - ringX) * 0.13;
    ringY += (mouseY - ringY) * 0.13;
    ring.style.left = ringX + 'px';
    ring.style.top  = ringY + 'px';
    requestAnimationFrame(animateRing);
  })();

  document.addEventListener('mouseleave', () => {
    dot.style.opacity   = '0';
    ring.style.opacity  = '0';
    arrow.style.opacity = '0';
    visible = false;
  });

  document.addEventListener('mousedown', () => {
    dot.style.transform  = 'translate(-50%,-50%) scale(0.75)';
    ring.style.transform = 'translate(-50%,-50%) scale(0.85)';
  });
  document.addEventListener('mouseup', () => {
    dot.style.transform  = 'translate(-50%,-50%) scale(1)';
    ring.style.transform = 'translate(-50%,-50%) scale(1)';
  });

  document.querySelectorAll('a, button, .img-wrap, .work-item').forEach(el => {
    el.addEventListener('mouseenter', () => {
      dot.style.transform    = 'translate(-50%,-50%) scale(1.6)';
      ring.style.width       = '58px';
      ring.style.height      = '58px';
      ring.style.borderColor = lb.classList.contains('open') ? '#ffffff' : '#1a1a1a';
    });
    el.addEventListener('mouseleave', () => {
      dot.style.transform    = 'translate(-50%,-50%) scale(1)';
      ring.style.width       = '38px';
      ring.style.height      = '38px';
      ring.style.borderColor = lb.classList.contains('open') ? '#ffffff' : '#1a1a1a';
    });
  });
})();
</script>

<script>
/* ── Lightbox ── */
(function () {
  const lb      = document.getElementById('lightbox');
  const imgA    = document.getElementById('lb-img-a');
  const imgB    = document.getElementById('lb-img-b');
  const lbVideo = document.getElementById('lb-video');
  const thumbsEl= document.getElementById('lb-thumbs');
  const closeBtn= document.getElementById('lb-close');
  const stage   = document.getElementById('lb-stage');

  const FADE = 520;

  let items = [];
  let activeIdx = 0;
  let aIsFront = true;
  let transitioning = false;

  // ── Zoom + pan state ──
  let scale = 1, tx = 0, ty = 0;
  let dragging = false, didDrag = false, mx0, my0, tx0, ty0;

  function applyT(anim) {
    const t = `translate(${tx}px,${ty}px) scale(${scale})`;
    if (anim) {
      imgA.style.transition = 'transform .18s ease, opacity 0.52s cubic-bezier(.4,0,.2,1)';
      imgB.style.transition = 'transform .18s ease, opacity 0.52s cubic-bezier(.4,0,.2,1)';
    }
    imgA.style.transform = t;
    imgB.style.transform = t;
    if (anim) setTimeout(() => {
      imgA.style.transition = 'opacity 0.52s cubic-bezier(.4,0,.2,1)';
      imgB.style.transition = 'opacity 0.52s cubic-bezier(.4,0,.2,1)';
    }, 200);
  }
  function resetT(anim) { scale = 1; tx = 0; ty = 0; applyT(anim); }
  function isVideoActive() {
    return lbVideo.style.display !== 'none' && parseFloat(lbVideo.style.opacity || 0) > 0.1;
  }

  function setCursor(white) {
    const dot  = document.getElementById('nc-dot');
    const ring = document.getElementById('nc-ring');
    if (dot)  dot.style.background   = white ? '#ffffff' : '#1a1a1a';
    if (ring) ring.style.borderColor = white ? '#ffffff' : '#1a1a1a';
  }

  function raf2(fn) { requestAnimationFrame(() => requestAnimationFrame(fn)); }

  function updateThumbs(idx) {
    thumbsEl.querySelectorAll('.lb-thumb').forEach((t,i) => t.classList.toggle('active', i===idx));
  }

  function setActive(idx) {
    if (idx === activeIdx || transitioning) return;
    transitioning = true;
    activeIdx = idx;
    resetT(false);
    updateThumbs(idx);
    const item = items[idx];

    if (item.type === 'video') {
      lbVideo.src = item.src;
      lbVideo.style.display = 'block';
      lbVideo.load();
      raf2(() => {
        imgA.style.opacity = '0';
        imgB.style.opacity = '0';
        lbVideo.style.opacity = '1';
        setTimeout(() => { transitioning = false; }, FADE);
      });
    } else {
      const front = aIsFront ? imgA : imgB;
      const back  = aIsFront ? imgB : imgA;

      const loader = new Image();
      loader.onload = () => {
        back.src = item.src;
        raf2(() => {
          front.style.opacity   = '0';
          lbVideo.style.opacity = '0';
          back.style.opacity    = '1';
          aIsFront = !aIsFront;
          setTimeout(() => {
            lbVideo.pause();
            lbVideo.style.display = 'none';
            transitioning = false;
          }, FADE);
        });
      };
      loader.onerror = loader.onload;
      loader.src = item.src;
    }
  }

  function makeThumb(item, idx) {
    if (item.type === 'video') {
      const d  = document.createElement('div');
      d.className = 'lb-thumb lb-thumb-vid' + (idx===activeIdx?' active':'');
      const ti = document.createElement('img'); ti.src = item.thumb||''; ti.alt='';
      const pi = document.createElement('span'); pi.textContent = '▶';
      d.appendChild(ti); d.appendChild(pi);
      d.addEventListener('click', () => setActive(idx));
      return d;
    }
    const t = document.createElement('img');
    t.src = item.src;
    t.className = 'lb-thumb' + (idx===activeIdx?' active':'');
    t.addEventListener('click', () => setActive(idx));
    return t;
  }

  function open(newItems, startIdx) {
    items     = newItems;
    activeIdx = startIdx;
    aIsFront  = true;
    transitioning = false;
    resetT(false);

    imgA.style.opacity = '0'; imgA.src = '';
    imgB.style.opacity = '0'; imgB.src = '';
    lbVideo.style.opacity = '0'; lbVideo.style.display = 'none';
    lbVideo.pause(); lbVideo.src = '';

    const first = items[startIdx];
    if (first.type === 'video') {
      lbVideo.src = first.src;
      lbVideo.style.display = 'block';
      lbVideo.load();
    } else {
      imgA.src = first.src;
    }

    thumbsEl.innerHTML = '';
    items.forEach((item, i) => thumbsEl.appendChild(makeThumb(item, i)));

    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
    setCursor(true);

    raf2(() => {
      if (first.type === 'video') lbVideo.style.opacity = '1';
      else imgA.style.opacity = '1';
    });
  }

  function close() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
    lbVideo.pause();
    setCursor(false);
    resetT(false);
    setTimeout(() => {
      imgA.src=''; imgB.src='';
      lbVideo.src=''; lbVideo.style.display='none';
    }, 460);
  }

  function prev() { resetT(false); setActive((activeIdx - 1 + items.length) % items.length); }
  function next() { resetT(false); setActive((activeIdx + 1) % items.length); }

  // ── Wheel zoom ──
  lb.addEventListener('wheel', e => {
    if (!lb.classList.contains('open') || isVideoActive()) return;
    e.preventDefault();
    const sr = stage.getBoundingClientRect();
    const cx = e.clientX - (sr.left + sr.width  / 2);
    const cy = e.clientY - (sr.top  + sr.height / 2);
    const f  = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    const ns = Math.max(0.2, Math.min(12, scale * f));
    tx += cx * (1 - ns / scale);
    ty += cy * (1 - ns / scale);
    scale = ns;
    applyT(false);
  }, { passive: false });

  // ── Pan (drag) ──
  lb.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    if (e.target.closest('#lb-close, #lb-thumbs, #lb-video')) return;
    dragging = true; didDrag = false;
    mx0 = e.clientX; my0 = e.clientY; tx0 = tx; ty0 = ty;
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.clientX - mx0, dy = e.clientY - my0;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) didDrag = true;
    tx = tx0 + dx; ty = ty0 + dy; applyT(false);
  });
  window.addEventListener('mouseup', () => { dragging = false; });

  // ── Double-click: reset or zoom 2× ──
  lb.addEventListener('dblclick', e => {
    if (e.target.closest('#lb-close, #lb-thumbs, #lb-video') || isVideoActive()) return;
    if (scale > 1.05) { resetT(true); return; }
    const sr = stage.getBoundingClientRect();
    const cx = e.clientX - (sr.left + sr.width  / 2);
    const cy = e.clientY - (sr.top  + sr.height / 2);
    tx += cx * (1 - 2); ty += cy * (1 - 2); scale = 2; applyT(true);
  });

  closeBtn.addEventListener('click', close);
  lb.addEventListener('click', e => {
    if (didDrag) { didDrag = false; return; }
    if (e.target.closest('#lb-close, #lb-thumbs, #lb-video')) return;
    if (scale > 1.05) return;
    if (e.clientX < window.innerWidth / 2) prev(); else next();
  });
  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape')     close();
    if (e.key === 'ArrowLeft')  prev();
    if (e.key === 'ArrowRight') next();
  });

  document.querySelectorAll('.img-wrap').forEach(wrap => {
    wrap.addEventListener('click', e => {
      e.preventDefault();
      let mediaItems;
      if (wrap.dataset.lightbox) {
        mediaItems = JSON.parse(wrap.dataset.lightbox);
      } else {
        mediaItems = Array.from(wrap.querySelectorAll('img'))
          .map(i => ({ type:'image', src: i.getAttribute('src') }));
      }
      open(mediaItems, 0);
    });
  });

  const params = new URLSearchParams(window.location.search);
  if (params.get('open') === 'kettlesyard') {
    const wrap = document.getElementById('kettlesyard-wrap');
    if (wrap) wrap.click();
  }
})();
</script>
